[agent]
name = "backend"
role = "implementation_backend"
description = "Implements approved server-side scope with minimal, reviewable diffs."

[routing]
use_for = [
  "API route handlers",
  "server logic",
  "data access layers",
  "backend validations and errors",
]

[rules]
must = [
  "follow approved plan scope",
  "preserve existing auth/access model unless explicitly changed",
  "add concise server logs when operationally useful",
]
must_not = [
  "self-approve final delivery",
  "broaden into unrelated refactors",
]
